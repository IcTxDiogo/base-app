name: Testes da Aplicação

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: 🏁 Testes de Backend (Pest)

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: laravel_test
      DB_USERNAME: user
      DB_PASSWORD: password

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Setup do PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, redis
          tools: composer:v2

      - name: 3. Setup do Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 4. Instalar dependências (Composer e NPM)
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: 5. Definir Permissões de Pasta
        run: chmod -R 777 storage bootstrap/cache

      - name: 6. Copiar .env.example para .env
        run: cp .env.dusk.local.example .env

      - name: 7. Compilar os assets para o manifesto
        run: npm run build

      - name: 8. Gerar a chave da aplicação
        run: php artisan key:generate

      - name: 9. Limpar caches de configuração
        run: php artisan config:clear

      - name: 10. Executar os testes de backend
        run: php artisan test --parallel

  # Job 2: Executa os testes de browser (Dusk)
  dusk-tests:
    runs-on: ubuntu-latest
    name: 🚗 Testes de Browser (Dusk)
    needs: backend-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Setup do PHP e Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, redis
          tools: composer:v2

      - name: 3. Setup do Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 4. Instalar o Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: 5. Instalar dependências (Node e Composer)
        run: |
          npm ci
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: 6. Compilar os assets
        run: npm run build

      - name: 7. Copiar e configurar os ambientes
        run: |
          cp .env.dusk.local.example .env
          sed -i '/^DB_CONNECTION=/s/=.*/=pgsql/' .env
          sed -i '/^DB_HOST=/s/=.*/=127.0.0.1/' .env
          sed -i '/^DB_PORT=/s/=.*/=5432/' .env
          sed -i '/^DB_DATABASE=/s/=.*/=laravel_test/' .env
          sed -i '/^DB_USERNAME=/s/=.*/=user/' .env
          sed -i '/^DB_PASSWORD=/s/=.*/=password/' .env
           sed -i '/^APP_URL=/s/=.*/=http:\/\/127.0.0.1:8000/' .env

          cp .env.dusk.local.example .env.dusk.local
          sed -i '/^APP_URL=/s/=.*/=http:\/\/127.0.0.1:8000/' .env.dusk.local

      - name: 8. Gerar e sincronizar as chaves
        run: |
          php artisan key:generate
          APP_KEY=$(grep "^APP_KEY=" .env | cut -d'=' -f2-)
          sed -i "s#^APP_KEY=.*#APP_KEY=${APP_KEY}#" .env.dusk.local

      - name: 9. Executar as migrações
        run: php artisan migrate --force

      - name: 10. Iniciar o servidor da aplicação em background
        run: php artisan serve &

      - name: 11. Iniciar o ChromeDriver na Porta Correta
        run: |
          echo "Iniciando o ChromeDriver FORÇADAMENTE na porta 9515..."
          chromedriver --port=9515 &

          echo "Aguardando 5 segundos para o serviço estabilizar..."
          sleep 5

      - name: 12. Executar os testes de Dusk
        run: php artisan dusk
